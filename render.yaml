services:
  - type: web
    name: paper-analyzer
    env: python
    region: oregon
    plan: free
    buildCommand: "bash build.sh"
    startCommand: "gunicorn paper_analyzer.wsgi:application --workers 1 --timeout 120 --max-requests 1000 --bind 0.0.0.0:$PORT"
    preDeployCommand: "python manage.py migrate --noinput"
    
    envVars:
      # ===== Django Security =====
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      
      # ===== Render Configuration =====
      - key: RENDER_EXTERNAL_HOSTNAME
        fromService:
          type: web
          name: paper-analyzer
          property: host
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      
      # ===== Database (PostgreSQL) =====
      - key: DATABASE_URL
        fromDatabase:
          name: paper-analyzer-db
          property: connectionString
      
      # ===== API Keys (Set in Dashboard) =====
      - key: GROQ_API_KEY
        sync: false
      
      # ===== Email Configuration =====
      - key: EMAIL_HOST
        value: "smtp.gmail.com"
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "True"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      
      # ===== PDF Processing =====
      - key: PDF_MAX_PAGES
        value: "25"
      - key: PDF_PREFER_FAST
        value: "True"
      - key: LARGE_PDF_SKIP_PLUMBER_MB
        value: "12"
      
      # ===== ML Processing =====
      - key: ANALYSIS_TEXT_MAX
        value: "50000"
      - key: ANALYSIS_TEXT_CAP
        value: "50000"
      - key: ENABLE_HEAVY_ML
        value: "False"
      
      # ===== File Upload Limits =====
      - key: MAX_PDF_UPLOAD_MB
        value: "45"
      - key: MAX_STORE_PDF_MB
        value: "16"
      
      # ===== Logging =====
      - key: LOG_LEVEL
        value: "INFO"

databases:
  - name: paper-analyzer-db
    engine: postgres
    plan: free
    version: "15"
