{% extends 'analyzer/base.html' %}
{% load static %}
{% block title %}Reset Password - PaperAIzer{% endblock %}

{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <a href="{% url 'home' %}" class="navbar-brand" style="justify-content: center; margin-bottom: 0.5rem;">
        <div class="brand-icon">
          <i class="fas fa-brain"></i>
        </div>
        <span class="brand-text">Paper<span class="brand-accent">AI</span>zer</span>
      </a>
      <h2>Reset your password</h2>
      <p>Enter your email to receive a reset link</p>
    </div>

    <form method="post" class="auth-form">
      {% csrf_token %}
      
      <div class="form-group">
        <label class="form-label" for="id_email">
          <i class="fas fa-envelope"></i> Email Address
        </label>
        <input type="email" name="email" id="id_email" class="form-control" placeholder="Enter your email address" required>
      </div>

      <button type="submit" class="btn-primary-custom">
        <i class="fas fa-paper-plane"></i> Send Reset Link
      </button>
    </form>

    <div class="auth-footer">
      <p style="margin-bottom: 0; color: var(--text-secondary);">
        Remembered your password? 
        <a href="{% url 'login' %}">Sign in</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
